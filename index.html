<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Powerwell Direct Hub | Millionaire Funnel</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    html, body { height: 100%; margin: 0; scroll-behavior: smooth; background: #0a0e27; color: white; }
    .font-display { font-family: 'Syne', sans-serif; }
    .font-body { font-family: 'DM Sans', sans-serif; }
    .cta-btn { background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%); transition: all 0.3s ease; }
    .cta-btn:hover { transform: scale(1.03); filter: brightness(1.1); }
  </style>
 </head>
 <body class="font-body">

  <div id="app-wrapper" class="w-full">
   <section class="py-20 px-6 text-center max-w-4xl mx-auto">
     <h1 class="font-display text-5xl md:text-7xl mb-6">₱1,998 to Launch Your Digital Empire.</h1>
     <p class="text-xl opacity-70 mb-10">Direct access to the Powerwell Hub inventory.</p>
     <button onclick="openSignupForm()" class="cta-btn text-green-950 font-bold px-10 py-4 rounded-2xl text-xl">JOIN THE TEAM NOW</button>
   </section>

   <div id="signup-modal" class="fixed inset-0 bg-black/80 z-50 hidden flex items-center justify-center p-4">
     <div class="bg-white text-gray-900 rounded-3xl p-8 max-w-md w-full relative">
       <button onclick="closeSignupForm()" class="absolute top-4 right-4 text-gray-400">✕</button>
       
       <div id="form-content">
         <h2 class="font-display text-2xl text-green-800 mb-6">Get Started</h2>
         <form id="reg-form" onsubmit="sendData(event)">
           <div class="space-y-4">
             <input type="text" id="user-name" placeholder="Full Name" required class="w-full p-3 bg-gray-100 rounded-xl outline-none">
             <input type="email" id="user-email" placeholder="Email Address" required class="w-full p-3 bg-gray-100 rounded-xl outline-none">
             <input type="tel" id="user-phone" placeholder="Phone (09XXXXXXXXX)" required class="w-full p-3 bg-gray-100 rounded-xl outline-none">
             <button type="submit" id="submit-btn" class="w-full cta-btn text-white py-4 rounded-xl font-bold mt-4">SUBMIT DETAILS</button>
           </div>
         </form>
       </div>

       <div id="success-message" class="hidden text-center py-8">
         <div class="text-green-500 text-6xl mb-4">✓</div>
         <h3 class="text-2xl font-bold mb-2">Success!</h3>
         <p class="text-gray-500">Form reset. You can now close this window.</p>
         <button onclick="closeSignupForm()" class="mt-6 text-green-600 font-bold underline">Close</button>
       </div>
     </div>
   </div>
  </div>

  <script>
    // YOUR NEW URL
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzQWF3Of9YYlA3dtsa1hido6QSGlQpWni_VensjKsNjb-nmzkucvtLTgOzTHWlr3cOv/exec";

    function openSignupForm() { 
        document.getElementById('signup-modal').classList.remove('hidden'); 
    }

    function closeSignupForm() { 
        document.getElementById('signup-modal').classList.add('hidden');
        // RESET LOGIC: This clears the inputs and goes back to the form UI
        document.getElementById('reg-form').reset();
        document.getElementById('form-content').classList.remove('hidden');
        document.getElementById('success-message').classList.add('hidden');
        document.getElementById('submit-btn').disabled = false;
        document.getElementById('submit-btn').textContent = "SUBMIT DETAILS";
    }

    async function sendData(e) {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.textContent = "Sending...";

      // Using URLSearchParams for Google Script compatibility
      const params = new URLSearchParams();
      params.append('name', document.getElementById('user-name').value);
      params.append('email', document.getElementById('user-email').value);
      params.append('phone', document.getElementById('user-phone').value);

      try {
        await fetch(SCRIPT_URL, { 
          method: 'POST', 
          body: params,
          mode: 'no-cors' 
        });

        // Hide form, show success
        document.getElementById('form-content').classList.add('hidden');
        document.getElementById('success-message').classList.remove('hidden');
        
      } catch (err) {
        alert("Check your internet connection.");
        btn.disabled = false;
        btn.textContent = "SUBMIT DETAILS";
      }
    }
  </script>
 </body>
</html>
