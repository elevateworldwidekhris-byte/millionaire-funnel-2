<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Powerwell Direct Hub | Millionaire Funnel</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    html, body { height: 100%; margin: 0; scroll-behavior: smooth; background: #0a0e27; color: white; }
    .font-display { font-family: 'Syne', sans-serif; }
    .font-body { font-family: 'DM Sans', sans-serif; }
    .cta-btn { background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%); transition: all 0.3s ease; }
    .cta-btn:hover { transform: scale(1.03); filter: brightness(1.1); }
    .fb-btn { background: #1877F2; transition: all 0.3s ease; }
    .fb-btn:hover { background: #166fe5; transform: translateY(-2px); }
  </style>
 </head>
 <body class="font-body">

  <div id="app-wrapper" class="w-full">
   <section class="py-20 px-6 text-center max-w-4xl mx-auto">
     <span class="inline-block px-4 py-1 rounded-full bg-green-500/10 text-green-400 text-xs font-bold mb-6">OFFICIAL HUB PARTNER</span>
     <h1 class="font-display text-5xl md:text-7xl mb-6">₱1,998 to Launch Your Digital Empire.</h1>
     <p class="text-xl opacity-70 mb-10">Direct access to the Powerwell Hub inventory.</p>
     <button onclick="openSignupForm()" class="cta-btn text-green-950 font-bold px-10 py-4 rounded-2xl text-xl">JOIN THE TEAM NOW</button>
   </section>

   <section class="py-16 bg-[#0f1629] border-y border-white/5">
     <div class="max-w-4xl mx-auto px-6">
       <div class="aspect-video rounded-3xl overflow-hidden shadow-2xl border border-green-500/20">
         <iframe width="100%" height="100%" src="https://player.vimeo.com/video/1182892372" frameborder="0" allowfullscreen></iframe>
       </div>
     </div>
   </section>

   <footer class="py-10 text-center opacity-30 text-xs">
     © 2026 Powerwell Direct Hub.
   </footer>

   <div id="signup-modal" class="fixed inset-0 bg-black/80 z-50 hidden flex items-center justify-center p-4">
     <div class="bg-white text-gray-900 rounded-3xl p-8 max-w-md w-full relative">
       <button onclick="closeSignupForm()" class="absolute top-4 right-4 text-gray-400">✕</button>
       
       <div id="form-content">
         <h2 class="font-display text-2xl text-green-800 mb-6">Get Started</h2>
         <form id="reg-form" onsubmit="sendData(event)">
           <div class="space-y-4">
             <div>
               <label class="text-xs font-bold text-gray-500 uppercase">Full Name</label>
               <input type="text" id="user-name" required class="w-full p-3 bg-gray-100 rounded-xl outline-none focus:ring-2 focus:ring-green-500">
             </div>
             <div>
               <label class="text-xs font-bold text-gray-500 uppercase">Email Address</label>
               <input type="email" id="user-email" required class="w-full p-3 bg-gray-100 rounded-xl outline-none focus:ring-2 focus:ring-green-500">
             </div>
             <div>
               <label class="text-xs font-bold text-gray-500 uppercase">Phone Number</label>
               <input type="tel" id="user-phone" placeholder="09XXXXXXXXX" required class="w-full p-3 bg-gray-100 rounded-xl outline-none focus:ring-2 focus:ring-green-500">
             </div>
             <button type="submit" id="submit-btn" class="w-full cta-btn text-white py-4 rounded-xl font-bold mt-4">SUBMIT DETAILS</button>
           </div>
         </form>
       </div>

       <div id="success-message" class="hidden text-center py-6">
         <div class="text-green-500 text-6xl mb-4">✓</div>
         <h3 class="text-2xl font-bold mb-2">Welcome to the Team!</h3>
         <p class="text-gray-500 mb-8">Your details have been saved. We will contact you shortly.</p>
         
         <div class="space-y-3">
           <a href="https://www.facebook.com/profile.php?id=61587556223299" target="_blank" class="fb-btn block w-full text-white font-bold py-4 rounded-xl flex items-center justify-center gap-2">
             <i data-lucide="facebook"></i> VISIT OUR FACEBOOK
           </a>
           <button onclick="closeSignupForm()" class="block w-full text-gray-400 text-sm font-semibold py-2">Close Window</button>
         </div>
       </div>
     </div>
   </div>
  </div>

  <script>
    // Lucide Icon Initialization
    lucide.createIcons();

    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzQWF3Of9YYlA3dtsa1hido6QSGlQpWni_VensjKsNjb-nmzkucvtLTgOzTHWlr3cOv/exec";

    function openSignupForm() { 
        // Show modal
        document.getElementById('signup-modal').classList.remove('hidden'); 
        
        // RESET VIEW: Ensure the form is showing and success is hidden
        document.getElementById('form-content').classList.remove('hidden');
        document.getElementById('success-message').classList.add('hidden');
        
        // Reset button
        const btn = document.getElementById('submit-btn');
        btn.disabled = false;
        btn.textContent = "SUBMIT DETAILS";
    }

    function closeSignupForm() { 
        document.getElementById('signup-modal').classList.add('hidden');
        // Reset the input values
        document.getElementById('reg-form').reset();
    }

    async function sendData(e) {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.textContent = "Sending...";

      const params = new URLSearchParams();
      params.append('name', document.getElementById('user-name').value);
      params.append('email', document.getElementById('user-email').value);
      params.append('phone', document.getElementById('user-phone').value);

      try {
        await fetch(SCRIPT_URL, { 
          method: 'POST', 
          body: params,
          mode: 'no-cors' 
        });

        // Hide form and show success with FB button
        document.getElementById('form-content').classList.add('hidden');
        document.getElementById('success-message').classList.remove('hidden');
        
      } catch (err) {
        alert("Check your internet connection.");
        btn.disabled = false;
        btn.textContent = "SUBMIT DETAILS";
      }
    }
  </script>
 </body>
</html>
