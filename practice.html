<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Powerwell Direct Hub | Practice Panel</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,600&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    html, body { height: 100%; margin: 0; scroll-behavior: smooth; background: #020617; color: #ffffff; }
    .font-premium { font-family: 'Cormorant Garamond', serif; }
    .font-body { font-family: 'Montserrat', sans-serif; }
    
    /* STABLE BACKGROUND LINK */
    .hero-bg {
        background-image: linear-gradient(to bottom, rgba(2, 6, 23, 0.85), rgba(2, 6, 23, 0.98)), 
        url('https://images.pexels.com/photos/4481258/pexels-photo-4481258.jpeg?auto=compress&cs=tinysrgb&w=1600'); 
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
    }

    .text-gold { 
      background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c); 
      -webkit-background-clip: text; 
      -webkit-text-fill-color: transparent; 
    }

    .growth-card {
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid rgba(16, 185, 129, 0.15);
        backdrop-filter: blur(10px);
    }

    .cta-btn { 
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      color: white; 
      box-shadow: 0 10px 30px rgba(16, 185, 129, 0.2); 
      transition: all 0.4s ease;
      letter-spacing: 0.1em;
    }
  </style>
 </head>
 <body class="font-body font-light">

  <div id="app-wrapper" class="w-full">
   <section class="relative min-h-screen flex items-center justify-center py-20 px-6 text-center hero-bg">
     <div class="relative z-10 max-w-6xl mx-auto">
       <div class="flex items-center justify-center gap-3 mb-10">
          <span class="px-4 py-1 rounded-full bg-emerald-500/10 border border-emerald-500/30 text-[9px] font-bold uppercase text-emerald-400 tracking-[0.3em]">Direct Sourcing • Global Logistics</span>
       </div>

       <h1 class="font-premium text-6xl md:text-8xl lg:text-9xl mb-10 leading-[1.1] md:leading-[1] tracking-tight">
         ₱1,998 to Launch Your <br class="hidden md:block">
         <span class="text-gold italic font-semibold text-7xl md:text-9xl">Digital Empire.</span>
       </h1>

       <button onclick="openSignupForm()" class="cta-btn font-body font-bold px-14 py-6 rounded-full text-sm uppercase transition-all mb-12">
         Start Growing Wealth
       </button>
       
       <div class="grid grid-cols-2 md:grid-cols-4 gap-4 max-w-4xl mx-auto opacity-80">
          <div class="growth-card p-6 rounded-2xl flex flex-col items-center gap-2">
            <i data-lucide="trending-up" class="w-5 text-emerald-400"></i>
            <span class="text-[9px] font-bold uppercase tracking-widest text-white">Passive Scaling</span>
          </div>
          <div class="growth-card p-6 rounded-2xl flex flex-col items-center gap-2">
            <i data-lucide="package" class="w-5 text-emerald-400"></i>
            <span class="text-[9px] font-bold uppercase tracking-widest text-white">No Inventory needed</span>
          </div>
          <div class="growth-card p-6 rounded-2xl flex flex-col items-center gap-2">
            <i data-lucide="bar-chart-3" class="w-5 text-emerald-400"></i>
            <span class="text-[9px] font-bold uppercase tracking-widest text-white">Millionaire Hub</span>
          </div>
          <div class="growth-card p-6 rounded-2xl flex flex-col items-center gap-2">
            <i data-lucide="shield-check" class="w-5 text-emerald-400"></i>
            <span class="text-[9px] font-bold uppercase tracking-widest text-white">Legal & Secure</span>
          </div>
       </div>
     </div>
   </section>

   <section class="py-24 bg-[#010413]">
     <div class="max-w-6xl mx-auto px-6">
        <h2 class="font-premium text-4xl text-center text-gold mb-16 italic underline decoration-1 underline-offset-8">Official Verification</h2>
        <div class="grid md:grid-cols-2 gap-12">
            <div class="bg-white/5 p-4 rounded-3xl border border-white/10">
                <p class="text-[10px] font-bold uppercase tracking-widest text-center mb-4 opacity-50">FDA Compliance</p>
                <img src="https://i.ibb.co/JFHyLv8/image.png" onerror="this.src='https://placehold.co/600x800/111/d4af37?text=View+FDA+on+Google+Drive'" class="w-full h-auto rounded-xl shadow-2xl">
            </div>
            <div class="bg-white/5 p-4 rounded-3xl border border-white/10">
                <p class="text-[10px] font-bold uppercase tracking-widest text-center mb-4 opacity-50">DTI Registration</p>
                <img src="https://i.ibb.co/yFHqGcn/image.png" onerror="this.src='https://placehold.co/600x800/111/d4af37?text=View+DTI+on+Google+Drive'" class="w-full h-auto rounded-xl shadow-2xl">
            </div>
        </div>
     </div>
   </section>

  </div>

  <script>
    lucide.createIcons();
    function openSignupForm() { alert("Signup Logic Active"); }
  </script>
 </body>
</html>
